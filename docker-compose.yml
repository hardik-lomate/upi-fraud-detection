version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env.example
    volumes:
      - ./fraud_detection.db:/app/fraud_detection.db
      - ./ml/models:/app/ml/models
      - ./monitoring:/app/monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Run only when explicitly invoked: docker-compose run trainer
  trainer:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python ml/generate_data.py &&
             python ml/feature_engineering.py &&
             python ml/train_ensemble.py"
    volumes:
      - ./ml:/app/ml
      - ./monitoring:/app/monitoring
    profiles:
      - train

volumes:
  redis_data:
